<body>
<div class="slider-container" id="mode-selector">
  <div class="slider-item" data-mode="alice" data-idx="0">Alice</div>
  <div class="slider-item active" data-mode="none" data-idx="1">Neural Net</div>
  <div class="slider-item" data-mode="bob" data-idx="2">Bob</div>
  <div class="slider-glider"></div>
</div>
<div class="viz-wrapper">
  <svg viewBox="0 0 850 500">
    <g id="edge-layer"></g>
    <g id="interpret-layer" class="overlay">
      <g id="arithmetic-lines"></g>
      <g id="signal-nodes"></g>
    </g>
    <g id="node-layer"></g>
  </svg>
</div>
<script>
  const COORDS = {
    x1: { x: 100, y: 150 }, x2: { x: 100, y: 350 },
    h1: { x: 380, y: 100 }, h3: { x: 380, y: 250 }, h2: { x: 380, y: 400 },
    y:  { x: 730, y: 250 }
  };

  const ARCHITECTURE = [
    { from: ['x1', 'x2'], to: ['h1', 'h3', 'h2'] },
    { from: ['h1', 'h3', 'h2'], to: ['y'] }
  ];

  let state = { x1: 0, x2: 0, mode: 'none' };

  function init() {
    document.getElementById('edge-layer').innerHTML = ARCHITECTURE.flatMap(l => l.from.flatMap(f => l.to.map(t => 
      `<line class="edge" x1="${COORDS[f].x}" y1="${COORDS[f].y}" x2="${COORDS[t].x}" y2="${COORDS[t].y}" />`
    ))).join('');

    document.getElementById('node-layer').innerHTML = Object.keys(COORDS).map(id => {
      const pos = COORDS[id];
      const isInput = id.startsWith('x');
      const isOutput = id === 'y';
      return `<g id="node-${id}" class="node-group" ${isInput ? `onclick="toggleInput('${id}')" style="cursor:pointer"` : ''} transform="translate(${pos.x},${pos.y})">
        <text class="lbl" y="${isInput ? 5 : -55}">${isOutput ? 'y' : id.replace('h', 'h_').replace('x', 'x_')}</text>
        <circle class="nc" r="${isInput ? 40 : 35}" />
        <text id="nv-${id}" class="nv">0</text>
      </g>`;
    }).join('');
  }

  function drawInterpretation() {
    const layer = document.getElementById('arithmetic-lines');
    const sigLayer = document.getElementById('signal-nodes');
    let lines = '', nodes = '';

    if (state.mode === 'alice') {
      // a1 and a2 logic
      lines += drawSigLines(['h1', 'h3'], 540, 140, 'var(--alice)');
      lines += drawSigLines(['h2', 'h3'], 540, 360, 'var(--alice)');
      // y logic lines (from boxes to y)
      lines += `<path class="interpret-edge" d="M 630 140 Q 680 140 730 250" style="stroke: var(--alice)" />`;
      lines += `<path class="interpret-edge" d="M 630 360 Q 680 360 730 250" style="stroke: var(--alice)" />`;

      nodes += drawMechBox(540, 140, 'x₁ AND NOT x₂', 'a₁ = h₁ - h₃', 'val-a-1', 'var(--alice)');
      nodes += drawMechBox(540, 360, 'x₂ AND NOT x₁', 'a₂ = h₂ - h₃', 'val-a-2', 'var(--alice)');
      nodes += drawMechBox(730, 250, 'XOR(x₁, x₂)', 'OR(a₁, a₂)', 'val-a-y', 'var(--alice)');
    } else if (state.mode === 'bob') {
      // b1 and b2 logic
      lines += drawSigLines(['h3'], 540, 140, 'var(--bob)');
      lines += drawSigLines(['h1', 'h2', 'h3'], 540, 360, 'var(--bob)');
      // y logic lines
      lines += `<path class="interpret-edge" d="M 630 140 Q 680 140 730 250" style="stroke: var(--bob)" />`;
      lines += `<path class="interpret-edge" d="M 630 360 Q 680 360 730 250" style="stroke: var(--bob)" />`;

      nodes += drawMechBox(540, 140, 'NAND(x₁, x₂)', 'b₁ = 1 - h₃', 'val-b-1', 'var(--bob)');
      nodes += drawMechBox(540, 360, 'OR(x₁, x₂)', 'b₂ = h₁ + h₂ - h₃', 'val-b-2', 'var(--bob)');
      nodes += drawMechBox(730, 250, 'XOR(x₁, x₂)', 'AND(b₁, b₂)', 'val-b-y', 'var(--bob)');
    }
    layer.innerHTML = lines;
    sigLayer.innerHTML = nodes;
  }

  function drawSigLines(fromIds, tx, ty, color) {
    return fromIds.map(id => 
      `<path class="interpret-edge" d="M ${COORDS[id].x} ${COORDS[id].y} Q ${COORDS[id].x + 100} ${COORDS[id].y} ${tx} ${ty}" style="stroke: ${color}" />`
    ).join('');
  }

  function drawMechBox(x, y, head, math, valId, color) {
    return `<g transform="translate(${x},${y})">
      <rect class="sig-box-bg" x="-90" y="-30" width="180" height="60" rx="12" stroke="${color}" />
      <text class="sig-head" x="-75" y="-5" fill="${color}">${head}</text>
      <text class="sig-math" x="-75" y="18" fill="${color}">${math}</text>
      <g id="box-node-${valId}" class="node-group" transform="translate(60, 0)">
        <circle class="nc" r="22" />
        <text id="${valId}" class="nv" style="font-size: 14px">0</text>
      </g>
    </g>`;
  }

  function update() {
    const h = [sigmoid(state.x1-0.5), sigmoid(state.x2-0.5), sigmoid(state.x1+state.x2-1.5)];
    const yVal = sigmoid(h[0] + h[1] - 2*h[2] - 0.5);

    ['x1', 'x2'].forEach(id => {
      document.getElementById(`node-${id}`).classList.toggle('active', !!state[id]);
      document.getElementById(`nv-${id}`).textContent = state[id];
    });
    ['h1', 'h3', 'h2'].forEach((id, i) => {
      document.getElementById(`node-${id}`).classList.toggle('active', Math.round(h[i]));
      document.getElementById(`nv-${id}`).textContent = Math.round(h[i]);
    });
    document.getElementById('node-y').classList.toggle('active', Math.round(yVal));
    document.getElementById('nv-y').textContent = Math.round(yVal);

    const rh = h.map(v => Math.round(v));
    const ry = Math.round(yVal);

    if (state.mode === 'alice') {
      updateBoxNode('val-a-1', rh[0] - rh[2]);
      updateBoxNode('val-a-2', rh[1] - rh[2]);
      updateBoxNode('val-a-y', ry);
    } else if (state.mode === 'bob') {
      updateBoxNode('val-b-1', 1 - rh[2]);
      updateBoxNode('val-b-2', Math.max(0, rh[0] + rh[1] - rh[2]));
      updateBoxNode('val-b-y', ry);
    }
  }

  function updateBoxNode(id, val) {
    const rounded = Math.round(val);
    const textEl = document.getElementById(id);
    const nodeEl = document.getElementById(`box-node-${id}`);
    if (textEl) textEl.textContent = rounded;
    if (nodeEl) nodeEl.classList.toggle('active', rounded === 1);
  }

  const sigmoid = x => 1 / (1 + Math.exp(-25 * x));
  function toggleInput(i) { state[i] = state[i] ? 0 : 1; update(); }

  document.getElementById('mode-selector').addEventListener('click', e => {
    const item = e.target.closest('.slider-item');
    if (!item) return;
    state.mode = item.dataset.mode;
    document.documentElement.style.setProperty('--glider-pos', item.dataset.idx);
    document.querySelectorAll('.slider-item').forEach(el => el.classList.toggle('active', el === item));
    
    // Hide original output node when interpretation is active
    document.getElementById('node-y').style.opacity = state.mode === 'none' ? '1' : '0';
    document.getElementById('interpret-layer').classList.toggle('visible', state.mode !== 'none');
    document.querySelectorAll('.edge').forEach(el => el.style.opacity = state.mode === 'none' ? '0.08' : '0.02');
    
    drawInterpretation();
    update();
  });

  init();
  update();
</script>
